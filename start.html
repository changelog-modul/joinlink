<!DOCTYPE html>
<html>
<head>
    <title>Joining...</title>
    <script>
    async function getJobId() {
        try {
            const res = await fetch("/api/job"); // ambil dari API kamu
            const data = await res.json();
            return data.jobId;
        } catch (e) {
            return null;
        }
    }

    async function join() {
        const params = new URLSearchParams(window.location.search);
        const placeId = params.get("placeId");

        let jobId = await getJobId();

        if (!jobId) {
            document.body.innerHTML = "Waiting for server...";
            setTimeout(join, 2000);
            return;
        }

        const url = `roblox://placeId=${placeId}&gameInstanceId=${jobId}`;
        window.location.href = url;
    }

    join();
    </script>
</head>
<body>
Joining...
</body>
</html>
