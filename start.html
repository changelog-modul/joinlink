<script>
let lastJobId = "";
let joining = false;

async function joinLoop() {
    const params = new URLSearchParams(window.location.search);
    const placeId = params.get("placeId");

    if (!placeId) {
        document.body.innerHTML = "Missing placeId!";
        return;
    }

    try {
        const res = await fetch("/api/job");
        const data = await res.json();

        if (data.jobId && data.jobId !== lastJobId && !joining) {
            lastJobId = data.jobId;
            joining = true;

            let url = `roblox://placeId=${placeId}&gameInstanceId=${data.jobId}`;
            window.open(url, "_self");
            return;
        }

    } catch (e) {}

    setTimeout(joinLoop, 2000);
}

joinLoop();
</script>
